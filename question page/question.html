<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Quiz</title>
    <link rel="stylesheet" href="question.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="quiz-body">

    <div class="main-container">
        <header class="quiz-header">
            <div class="subject-info">
                <div id="header-icon-box" class="icon-box">
                    <img id="header-icon" src="" alt="Subject Icon">
                </div>
                <h2 id="header-title"></h2>
            </div>
            <div class="theme-toggle">
                </div>
        </header>

        <main class="quiz-content">
            <div class="question-side">
                <p id="tracker" class="tracker-text"></p>
                <h1 id="question" class="question-heading"></h1>
                
                <div class="progress-container">
                    <div id="progress" class="progress-fill"></div>
                </div>
            </div>

            <div class="options-side">
                <div id="options-container">
                    </div>
                <button id="main-btn" class="action-button">Submit Answer</button>
                <p id="error-msg" style="color: #EE5454; text-align: center; margin-top: 12px; display: none;">
                    Please select an answer
                </p>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const subject = params.get("subject") || "HTML";
        const quiz = quizData[subject];
        let i = 0, score = 0, selected = null;

        document.getElementById("header-title").textContent = subject;
        document.getElementById("header-icon").src = quiz.icon;
        document.getElementById("header-icon-box").style.backgroundColor = quiz.iconBg;

        function load() {
            const q = quiz.questions[i];
            document.getElementById("tracker").textContent = `Question ${i + 1} of ${quiz.questions.length}`;
            document.getElementById("question").textContent = q.question;
            document.getElementById("progress").style.width = ((i + 1) / quiz.questions.length) * 100 + "%";
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            selected = null;
            document.getElementById("main-btn").textContent = "Submit Answer";
            document.getElementById("error-msg").style.display = "none";

            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                const btn = document.createElement("div"); // Using div as defined in your CSS structure
                btn.className = "quiz-option";
                
                btn.innerHTML = `
                    <div class="option-letter">${letter}</div>
                    <span class="option-text" style="font-size: 24px; font-weight: 500;"></span>
                `;
                
                btn.getElementsByClassName('option-text')[0].textContent = opt.trim() === "" ? "None of the above" : opt;

                btn.onclick = () => {
                    if(document.getElementById("main-btn").textContent !== "Submit Answer") return;
                    
                    const allOptions = document.getElementsByClassName("quiz-option");
                    for (let optDiv of allOptions) {
                        optDiv.style.borderColor = "transparent";
                        optDiv.getElementsByClassName('option-letter')[0].style.backgroundColor = "#F4F6FA";
                        optDiv.getElementsByClassName('option-letter')[0].style.color = "#313E51";
                    }

                    btn.style.borderColor = "#A729F5";
                    selected = { el: btn, val: opt };
                };
                container.appendChild(btn);
            });
        }

        document.getElementById("main-btn").onclick = () => {
            const btn = document.getElementById("main-btn");
            if (btn.textContent !== "Submit Answer") {
                i++;
                if (i < quiz.questions.length) load();
                else location.href = `../score page/score_page.html?subject=${subject}&score=${score}&total=${quiz.questions.length}`;
                return;
            }
            if (!selected) {
                document.getElementById("error-msg").style.display = "block";
                return;
            }

            const correct = quiz.questions[i].answer;
            const letterBox = selected.el.getElementsByClassName('option-letter')[0];
            letterBox.style.color = "white";

            if (selected.val === correct) {
                score++;
                selected.el.style.borderColor = "#2FD887";
                letterBox.style.backgroundColor = "#2FD887";
            } else {
                selected.el.style.borderColor = "#EE5454";
                letterBox.style.backgroundColor = "#EE5454";
            }
            btn.textContent = (i + 1 < quiz.questions.length) ? "Next Question" : "Show Results";
        };

        load();
    </script>
</body>
</html>
