<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Questions</title>
    <link rel="stylesheet" href="question.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
</head>
<body class="quiz-body">
    <section class="main-container">
        <header class="quiz-header">
            <div class="subject-info" id="subject-header">
                <div class="icon-box" id="subject-icon-bg">
                    <img src="" alt="" id="subject-icon">
                </div>
                <h2 id="subject-title">Loading...</h2>
            </div>
            <div class="header-controls">
                <img src="../menu page/assets/Vector.png" alt="Sun" class="icon-small">
                <img src="../menu page/assets/Theme Toggle Icons.png" alt="Toggle" class="icon-toggle">
                <img src="../menu page/assets/Vector1.png" alt="Moon" class="icon-small">
            </div>
        </header>

        <main class="quiz-content">
            <div class="question-column">
                <div class="text-group">
                    <p class="tracker-text" id="question-tracker">Loading...</p>
                    <h2 class="question-heading" id="question-text">Loading...</h2>
                </div>
                
                <div class="progress-container">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="options-column">
                <div id="options-container">
                    </div>
                <button class="action-button" id="submit-btn">Submit Answer</button>
                <p class="error-msg" id="error-msg">Please select an answer first!</p>
            </div>
        </main>
    </section>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');

        const subjectTitle = document.getElementById('subject-title');
        const subjectIcon = document.getElementById('subject-icon');
        const subjectIconBg = document.getElementById('subject-icon-bg');
        
        const questionTracker = document.getElementById('question-tracker');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressFill = document.querySelector('.progress-fill');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        let currentQuestionIndex = 0;
        let score = 0;
        let optionSelected = false;
        let selectedElement = null;
        let isSubmitted = false;
        let questionsList = [];

        if (subject && quizData[subject]) {
            const subjectData = quizData[subject];
            questionsList = subjectData.questions;

            // Set Header UI
            subjectTitle.textContent = subject;
            subjectIcon.src = subjectData.icon;
            subjectIconBg.style.backgroundColor = subjectData.iconBg;

            loadQuestion();
        } else {
            questionText.textContent = "Error: Subject not found.";
            questionTracker.textContent = "";
            submitBtn.style.display = "none";
        }

        function loadQuestion() {
            const currentQ = questionsList[currentQuestionIndex];
            
            questionTracker.textContent = `Question ${currentQuestionIndex + 1} of ${questionsList.length}`;
            questionText.textContent = currentQ.question;
            
            optionsContainer.innerHTML = "";
            optionSelected = false;
            selectedElement = null;
            isSubmitted = false;
            submitBtn.textContent = "Submit Answer";
            errorMsg.style.display = "none";

            const letters = ['A', 'B', 'C', 'D'];
            currentQ.options.forEach((opt, index) => {
                // Updated Option Box matching Figma
                const optionHTML = `
                    <div class="quiz-option" data-value="${opt}" style="display: flex; align-items: center; background: #3B4D66;shadow-lg 16px 40px rgba(143, 160, 193, 0.14); padding: 18px; border-radius: 24px; margin-bottom: 24px; cursor: pointer; transition: all 0.3s ease; border: 3px solid transparent;">
                        <div class="option-letter" style="background: #F4F6FA; color: #626C7F; border-radius: 12px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 28px; margin-right: 32px; flex-shrink: 0; transition: all 0.3s ease; font-family: 'Rubik', sans-serif;">${letters[index]}</div>
                        <div class="quiz-label" style="font-size: 28px; font-weight: 500; color: white; font-family: 'Rubik', sans-serif;">${opt.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                    </div>
                `;
                optionsContainer.insertAdjacentHTML('beforeend', optionHTML);
            });

            const options = document.querySelectorAll('.quiz-option');
            options.forEach(option => {
                option.addEventListener('click', function () {
                    if (isSubmitted) return; 
                    
                    options.forEach(opt => {
                        opt.style.border = '3px solid transparent';
                        opt.querySelector('.option-letter').style.background = '#F4F6FA';
                        opt.querySelector('.option-letter').style.color = '#626C7F';
                    });

                    this.style.border = '3px solid #A729F5';
                    this.querySelector('.option-letter').style.background = '#A729F5';
                    this.querySelector('.option-letter').style.color = 'white';
                    
                    optionSelected = true;
                    selectedElement = this;
                    errorMsg.style.display = "none";
                });
            });
        }

        submitBtn.addEventListener('click', function () {
            if (!optionSelected) {
                errorMsg.style.display = "block";
                return;
            }

            if (!isSubmitted) {
                isSubmitted = true;
                const correctAnswer = questionsList[currentQuestionIndex].answer;
                const userAnswer = selectedElement.getAttribute('data-value');

                if (userAnswer === correctAnswer) {
                    selectedElement.style.border = '3px solid #2FD887';
                    selectedElement.querySelector('.option-letter').style.background = '#2FD887';
                    score++;
                } else {
                    selectedElement.style.border = '3px solid #EE5454';
                    selectedElement.querySelector('.option-letter').style.background = '#EE5454';
                }

                // Update Progress Bar
                const progressPercentage = ((currentQuestionIndex + 1) / questionsList.length) * 100;
                progressFill.style.width = `${progressPercentage}%`;

                if (currentQuestionIndex < questionsList.length - 1) {
                    submitBtn.textContent = "Next Question";
                } else {
                    submitBtn.textContent = "Finish Quiz";
                }
            } else {
                if (currentQuestionIndex < questionsList.length - 1) {
                    currentQuestionIndex++;
                    loadQuestion();
                } else {
                    window.location.href = `../score page/score_page.html?subject=${subject}&score=${score}&total=${questionsList.length}`;
                }
            }
        });
    </script>
</body>
</html>
