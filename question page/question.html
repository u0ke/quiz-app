<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Questions</title>
    <link rel="stylesheet" href="question.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <style>
        /* Small inline adjustments to match Figma structure */
        .icon-container {
            border-radius: 10px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 24px;
        }
        .icon-container img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .nav-subject {
            display: flex;
            align-items: center;
            padding: 32px 0;
        }
        .error-message {
            color: #EE5454;
            display: none;
            margin-top: 15px;
            text-align: center;
            font-family: 'Rubik', sans-serif;
            font-size: 18px;
        }
        
        /* Layout Structure */
        .hero-section {
            display: flex;
            justify-content: space-between;
            gap: 24px;
        }
        .first-hero, .second-hero {
            flex: 1;
        }
        
        /* Hover state for options */
        .quiz-option:hover .option-letter {
            background: #F6E7FF !important;
            color: #A729F5 !important;
        }
    </style>
</head>

<body>
    <section class="nav-section">
        <div class="nav-subject">
            <div class="icon-container" id="subject-icon-bg">
                <img src="" alt="" id="subject-icon">
            </div>
            <h2 class="quiz-label" id="subject-title" style="font-size: 28px; font-weight: 500; margin: 0; color: #313E51;">Loading...</h2>
        </div>
    </section>
    
    <section class="hero-section">
        <div class="first-hero" style="display: flex; flex-direction: column; justify-content: space-between; padding-right: 40px;">
            <div>
                <p class="d-p" id="question-tracker" style="font-style: italic; color: #626C7F; margin-bottom: 27px; font-size: 20px;">Loading...</p>
                <h2 class="d-h2" id="question-text" style="font-size: 36px; font-weight: 500; color: #313E51; line-height: 1.2;">Loading...</h2>
            </div>
            
            <div class="progress-bar" style="background-color: white; border-radius: 999px; height: 16px; margin-top: 40px; padding: 4px; display: flex; align-items: center; width: 100%;">
                <div class="progress-fill" style="background-color: #A729F5; height: 8px; border-radius: 999px; width: 0%; transition: width 0.4s ease;"></div>
            </div>
        </div>
        
        <div class="second-hero">
            <div id="options-container">
                </div>
            <button class="start-btn" id="submit-btn" style="width: 100%; background: #A729F5; color: white; padding: 24px; border-radius: 24px; border: none; font-size: 28px; font-weight: 500; font-family: 'Rubik', sans-serif; cursor: pointer; transition: 0.3s; box-shadow: 0 16px 40px rgba(167, 41, 245, 0.14);">Submit Answer</button>
            <p class="error-message" id="error-msg">Please select an answer first!</p>
        </div>
    </section>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');

        const subjectTitle = document.getElementById('subject-title');
        const subjectIcon = document.getElementById('subject-icon');
        const subjectIconBg = document.getElementById('subject-icon-bg');
        
        const questionTracker = document.getElementById('question-tracker');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressFill = document.querySelector('.progress-fill');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        let currentQuestionIndex = 0;
        let score = 0;
        let optionSelected = false;
        let selectedElement = null;
        let isSubmitted = false;
        let questionsList = [];

        if (subject && quizData[subject]) {
            const subjectData = quizData[subject];
            questionsList = subjectData.questions;

            // Set Header UI
            subjectTitle.textContent = subject;
            subjectIcon.src = subjectData.icon;
            subjectIconBg.style.backgroundColor = subjectData.iconBg;

            loadQuestion();
        } else {
            questionText.textContent = "Error: Subject not found.";
            questionTracker.textContent = "";
            submitBtn.style.display = "none";
        }

        function loadQuestion() {
            const currentQ = questionsList[currentQuestionIndex];
            
            questionTracker.textContent = `Question ${currentQuestionIndex + 1} of ${questionsList.length}`;
            questionText.textContent = currentQ.question;
            
            optionsContainer.innerHTML = "";
            optionSelected = false;
            selectedElement = null;
            isSubmitted = false;
            submitBtn.textContent = "Submit Answer";
            errorMsg.style.display = "none";

            const letters = ['A', 'B', 'C', 'D'];
            currentQ.options.forEach((opt, index) => {
                // Updated Option Box matching Figma
                const optionHTML = `
                    <div class="quiz-option" data-value="${opt}" style="display: flex; align-items: center; background: white; padding: 18px; border-radius: 24px; margin-bottom: 24px; cursor: pointer; box-shadow: 0 16px 40px rgba(143, 160, 193, 0.14); transition: all 0.3s ease; border: 3px solid transparent;">
                        <div class="option-letter" style="background: #F4F6FA; color: #626C7F; border-radius: 12px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 28px; margin-right: 32px; flex-shrink: 0; transition: all 0.3s ease; font-family: 'Rubik', sans-serif;">${letters[index]}</div>
                        <div class="quiz-label" style="font-size: 28px; font-weight: 500; color: #313E51; font-family: 'Rubik', sans-serif;">${opt.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                    </div>
                `;
                optionsContainer.insertAdjacentHTML('beforeend', optionHTML);
            });

            const options = document.querySelectorAll('.quiz-option');
            options.forEach(option => {
                option.addEventListener('click', function () {
                    if (isSubmitted) return; 
                    
                    options.forEach(opt => {
                        opt.style.border = '3px solid transparent';
                        opt.querySelector('.option-letter').style.background = '#F4F6FA';
                        opt.querySelector('.option-letter').style.color = '#626C7F';
                    });

                    this.style.border = '3px solid #A729F5';
                    this.querySelector('.option-letter').style.background = '#A729F5';
                    this.querySelector('.option-letter').style.color = 'white';
                    
                    optionSelected = true;
                    selectedElement = this;
                    errorMsg.style.display = "none";
                });
            });
        }

        submitBtn.addEventListener('click', function () {
            if (!optionSelected) {
                errorMsg.style.display = "block";
                return;
            }

            if (!isSubmitted) {
                isSubmitted = true;
                const correctAnswer = questionsList[currentQuestionIndex].answer;
                const userAnswer = selectedElement.getAttribute('data-value');

                if (userAnswer === correctAnswer) {
                    selectedElement.style.border = '3px solid #2FD887';
                    selectedElement.querySelector('.option-letter').style.background = '#2FD887';
                    score++;
                } else {
                    selectedElement.style.border = '3px solid #EE5454';
                    selectedElement.querySelector('.option-letter').style.background = '#EE5454';
                }

                // Update Progress Bar
                const progressPercentage = ((currentQuestionIndex + 1) / questionsList.length) * 100;
                progressFill.style.width = `${progressPercentage}%`;

                if (currentQuestionIndex < questionsList.length - 1) {
                    submitBtn.textContent = "Next Question";
                } else {
                    submitBtn.textContent = "Finish Quiz";
                }
            } else {
                if (currentQuestionIndex < questionsList.length - 1) {
                    currentQuestionIndex++;
                    loadQuestion();
                } else {
                    window.location.href = `../score page/score_page.html?subject=${subject}&score=${score}&total=${questionsList.length}`;
                }
            }
        });
    </script>
</body>

</html>
