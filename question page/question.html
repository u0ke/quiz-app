<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBlue: '#313E51',
                        navy: '#3B4D66',
                        purple: '#A729F5',
                        lightBlue: '#ABC1E1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBlue min-h-screen text-white p-6 md:p-16">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div id="icon-bg" class="p-2 rounded-xl">
                <img id="header-icon" src="" class="w-8 h-8">
            </div>
            <span id="header-title" class="text-2xl font-medium"></span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-12">
        <div class="flex flex-col">
            <p id="tracker" class="text-lightBlue italic text-xl mb-4"></p>
            <h1 id="question" class="text-3xl font-medium leading-tight mb-8"></h1>
            
            <div class="w-full bg-navy h-4 rounded-full p-1 mb-12">
                <div id="progress" class="bg-purple h-full rounded-full transition-all duration-500"></div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <div id="options" class="flex flex-col gap-4"></div>
            <button id="main-btn" class="w-full bg-purple py-5 rounded-3xl text-xl font-medium mt-4">Submit Answer</button>
            <p id="error" class="text-red-400 text-center hidden mt-2">Please select an answer</p>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const subject = params.get("subject") || "HTML";
        const quiz = quizData[subject];
        let i = 0, score = 0, selected = null;

        document.getElementById("header-title").textContent = subject;
        document.getElementById("header-icon").src = quiz.icon;
        document.getElementById("icon-bg").style.backgroundColor = quiz.iconBg;

        function load() {
            const q = quiz.questions[i];
            document.getElementById("tracker").textContent = `Question ${i + 1} of ${quiz.questions.length}`;
            document.getElementById("question").textContent = q.question;
            document.getElementById("progress").style.width = ((i + 1) / quiz.questions.length) * 100 + "%";
            
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            selected = null;
            document.getElementById("main-btn").textContent = "Submit Answer";

            q.options.forEach((opt, idx) => {
                const displayOpt = opt.trim() === "" ? "None of the above" : opt;
                const letter = String.fromCharCode(65 + idx);
                
                const btn = document.createElement("button");
                btn.className = "quiz-opt-btn group flex items-center gap-4 bg-navy p-4 rounded-3xl border-[3px] border-transparent text-left transition-all hover:border-purple outline-none";
                
                btn.innerHTML = `
                    <div class="letter-box w-12 h-12 flex items-center justify-center rounded-xl bg-[#F4F6FA] text-[#626C7F] text-xl font-medium transition-all">
                        ${letter}
                    </div>
                    <span class="opt-text text-xl font-medium flex-1"></span>
                `;
                
                btn.getElementsByClassName('opt-text')[0].textContent = displayOpt;

                btn.onclick = () => {
                    if(document.getElementById("main-btn").textContent !== "Submit Answer") return;
                    
                    const allBtns = document.getElementsByClassName("quiz-opt-btn");
                    for (let b of allBtns) {
                        b.style.borderColor = "transparent";
                        const lb = b.getElementsByClassName('letter-box')[0];
                        lb.style.backgroundColor = "#F4F6FA";
                        lb.style.color = "#626C7F";
                    }

                    btn.style.borderColor = "#A729F5";
                    selected = { el: btn, val: opt };
                    document.getElementById("error").classList.add("hidden");
                };
                optionsDiv.appendChild(btn);
            });
        }

        document.getElementById("main-btn").onclick = () => {
            const btn = document.getElementById("main-btn");
            if (btn.textContent !== "Submit Answer") {
                i++;
                if (i < quiz.questions.length) load();
                else location.href = `../score page/score_page.html?subject=${subject}&score=${score}&total=${quiz.questions.length}`;
                return;
            }
            if (!selected) return document.getElementById("error").classList.remove("hidden");

            const correct = quiz.questions[i].answer;
            const letterBox = selected.el.getElementsByClassName('letter-box')[0];
            letterBox.style.color = "white";

            if (selected.val === correct) {
                score++;
                selected.el.style.borderColor = "#2FD887";
                letterBox.style.backgroundColor = "#2FD887";
            } else {
                selected.el.style.borderColor = "#EE5454";
                letterBox.style.backgroundColor = "#EE5454";
            }
            btn.textContent = (i + 1 < quiz.questions.length) ? "Next Question" : "Show Results";
        };

        load();
    </script>
</body>
</html>
