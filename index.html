<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz app</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
        extend: {
            colors: {
            // Colors from images
            grey: {
                50: '#F4F6FA',
                500: '#626C7F',
            },
            blue: {
                50: '#EBFOFF',
                100: '#EDF1F9',
                300: '#ABC1E1',
                500: '#306AFF',
                850: '#3B4D66',
                900: '#313E51',
                950: '#2D3949',
            },
            green: {
                100: '#EOFDEF',
                500: '#2FD887',
            },
            purple: {
                100: '#F6E7FF',
                600: '#A729F5',
            },
            orange: {
                50: '#FFF5ED',
                400: '#FF7E35',
            },
            red: {
                500: '#EE5454',
            }

            },
            spacing: {
                '100': '8px',
                '200': '16px',
                '300': '24px',
                '400': '32px',
                '500': '40px',
                '600': '48px',
                '800': '64px',
                '1600': '128px',
                '1800': '144px',
                '2300': '184px',
            },
            fontFamily: {
            sans: ['Rubik', 'sans-serif'],
            }
        }
        }
    }
    </script>
</head>
<body>
    <section class="bg-blue-900">
        <div class="">
            <h1>Welcome to the <br> <p>Quiz App</p></h1>
        </div>

</html>
