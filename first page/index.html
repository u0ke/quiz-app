<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz app</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
        extend: {
            colors: {
            // Colors from images
            grey: {
                50: '#F4F6FA',
                500: '#626C7F',
            },
            blue: {
                50: '#EBFOFF',
                100: '#EDF1F9',
                300: '#ABC1E1',
                500: '#306AFF',
                850: '#3B4D66',
                900: '#313E51',
                950: '#2D3949',
            },
            green: {
                100: '#EOFDEF',
                500: '#2FD887',
            },
            purple: {
                100: '#F6E7FF',
                600: '#A729F5',
            },
            orange: {
                50: '#FFF5ED',
                400: '#FF7E35',
            },
            red: {
                500: '#EE5454',
            }

            },
            spacing: {
                '100': '8px',
                '200': '16px',
                '300': '24px',
                '400': '32px',
                '500': '40px',
                '600': '48px',
                '800': '64px',
                '1600': '128px',
                '1800': '144px',
                '2300': '184px',
            },
            fontFamily: {
            sans: ['Rubik', 'sans-serif'],
            }
        }
        }
    }
    </script>
</head>

<body>
    <section id="parent_section" class="bg-blue-900 min-h-screen bg-[url('./assets/Ellipse-8.png')] bg-no-repeat">
        <header class="flex justify-end p-6 md:p-10">
            <div class="flex items-center space-x-4">
                <img src="assets/Vector.png" alt="" class="w-[16px] h-[16px] object-contain md:w-[24px] h-[24px] object-contain">
                <img src="assets/Theme Toggle Icons.png" alt="" class="w-[32px] h-[20px] object-contain md:w-[48px] h-[28px]">
                <img src="assets/Vector1.png" alt="" class="w-[16px] h-[16px] object-contain md:w-[24px] h-[24px] object-contain">
            </div>
        </header>
        <main id="hero_parent" class="pt-[20px] px-[24px] py-[32px]">
            <section class="lg:grid grid-cols-2 px-[140px]">
                <div id="hero_div" class="">
                    <h1 class="text-white text-[40px] font-[300] leading-1 md: text-[64px]">
                        Welcome to the <br>
                        <span class="font-[500] leading-1">
                            Frontend quiz!
                        </span>
                    </h1>
                    <p class="text-blue-300 italic font-[400] text-[14px] leading-1.5 mt-[16px] md:text-[20px]">
                        Pick a subject to get started.
                    </p>
                </div>

                <div id="parent_div" class="text-white mb-[175px]">
                    <div class=" bg-blue-850 rounded-[24px] p-[16px] mt-[40px] flex items-center gap-[16px]">
                        <div class="bg-orange-50 rounded-[10px] w-[56px] h-[56px] flex items-center justify-center">
                            <img src="assets/Vector2.png" alt="" class="w-[32px] h-[32px] object-contain">
                        </div>
                        <p class="font-[500] text-[18px] md:text-[28px]">HTML</p>
                    </div>

                    <div class=" bg-blue-850 rounded-[24px] p-[16px] mt-[18px] flex items-center gap-[16px]">
                        <div class="bg-[#E0FDEF] rounded-[10px] w-[56px] h-[56px] flex items-center justify-center">
                            <img src="assets/Vector3.png" alt="" class="w-[32px] h-[32px] object-contain">
                        </div>
                        <p class="font-[500] text-[18px] md:text-[28px]">CSS</p>
                    </div>

                    <div class=" bg-blue-850 rounded-[24px] p-[16px] mt-[18px] flex items-center gap-[16px]">
                        <div class="bg-[#EBF0FF] rounded-[10px] w-[56px] h-[56px] flex items-center justify-center">
                            <img src="assets/Vector4.png" alt="" class="w-[32px] h-[32px] object-contain">
                        </div>
                        <p class="font-[500] text-[18px] md:text-[28px]">Javascript</p>
                    </div>

                    <div class=" bg-blue-850 rounded-[24px] p-[16px] mt-[18px] flex items-center gap-[16px]">
                        <div class="bg-[#F6E7FF] rounded-[10px] w-[56px] h-[56px] flex items-center justify-center">
                            <img src="assets/Vector5.png" alt="" class="w-[32px] h-[32px] object-contain">
                        </div>
                        <p class="font-[500] text-[18px] md:text-[28px]">Accessibility</p>
                    </div>
                </div>
            </section>
        </main>
    </section>
</body>
</html>
